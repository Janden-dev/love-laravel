# Nginx 虚拟主机模板 —— Love Laravel
#
# 占位符会在 deploy.sh 中被 sed 替换：
#   __PROJECT_ROOT__   项目 public 目录的绝对路径（如 /home/ubuntu/larry/public）
#   __PHP_FPM_SOCK__   PHP-FPM socket 路径（如 /run/php/php8.3-fpm.sock）
#
# 部署后落地路径: /etc/nginx/sites-available/laravel

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    root __PROJECT_ROOT__;
    index index.php index.html index.htm;

    server_name _;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    charset utf-8;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # 照片已改为私有磁盘 + Laravel 路由鉴权，禁止旧公开路径直接访问
    location ^~ /storage/uploads {
        deny all;
        return 404;
    }

    error_page 404 /index.php;

    location ~ \.php$ {
        fastcgi_pass unix:__PHP_FPM_SOCK__;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    access_log /var/log/nginx/laravel-access.log;
    error_log  /var/log/nginx/laravel-error.log;
}
